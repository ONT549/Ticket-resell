<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>티켓 목록</title>
</head>
<body>
  <h1>등록된 티켓 목록</h1>
  <table border="1">
    <thead>
      <tr>
        <th>팀</th>
        <th>날짜</th>
        <th>시간</th>
        <th>장소</th>
        <th>가격</th>
        <th>연락처</th>
        <th>상태</th>
      </tr>
    </thead>
    <tbody id="ticketTableBody">
    </tbody>
  </table>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    const SUPABASE_URL = 'https://dbdnvjbkotlyarsfmtjn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiZG52amJrb3RseWFyc2ZtdGpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDY5NTUxNTUsImV4cCI6MjA2MjUzMTE1NX0.cQXd9NQQbEQ5tWAeQ2pJWIoGkQjAbVs4tOQAUeDCET0';

    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function loadTickets() {
      const { data, error } = await supabase.from('tickets').select('*').order('date', { ascending: true });

      if (error) {
        alert('불러오기 오류: ' + error.message);
        return;
      }

      const tbody = document.getElementById('ticketTableBody');
      tbody.innerHTML = '';

      data.forEach(ticket => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${ticket.team}</td>
          <td>${ticket.date}</td>
          <td>${ticket.time}</td>
          <td>${ticket.location || ''}</td>
          <td>${ticket.price}</td>
          <td>${ticket.contact}</td>
          <td>${ticket.status}</td>
        `;
        tbody.appendChild(row);
      });
    }

    loadTickets();
  </script>
</body>
</html>
