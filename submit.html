<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>티켓 등록하기 - Our Ticket</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>🎟️ 티켓 등록하기</h1>
    <nav>
      <a href="index.html">🏠 홈으로</a>
    </nav>
  </header>

  <main class="form-container">
    <form action="submitted.html" method="POST">
      <label for="event">공연명</label>
      <input type="text" id="event" name="event" placeholder="예: IU 콘서트" required />

      <label for="date">날짜</label>
      <input type="date" id="date" name="date" required />

      <label for="seat">좌석 정보</label>
      <input type="text" id="seat" name="seat" placeholder="예: 2층 A열 10번" required />

      <label for="price">가격 (원)</label>
      <input type="number" id="price" name="price" placeholder="예: 150000" required />

      <label for="contact">연락 방법</label>
      <input type="text" id="contact" name="contact" placeholder="예: 오픈카톡 링크" required />

      <button type="submit">등록하기</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2025 Our Ticket</p>
  </footer>
</body>
</html>
