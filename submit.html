
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>티켓 등록</title>
  <style>
    body { font-family: sans-serif; padding: 40px; }
    form { max-width: 900px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    .form-row { display: flex; gap: 20px; flex-wrap: wrap; }
    .form-group { flex: 1; min-width: 200px; display: flex; flex-direction: column; }
    label { font-weight: bold; margin-bottom: 6px; }
    select, input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
  </style>
</head>
<body>
  <h1 style="text-align:center;">🎟️ 티켓 등록</h1>
  <form id="ticketForm">
    <div class="form-group">
      <label for="sport_type">종목</label>
      <select id="sport_type">
        <option value="">-- 선택 --</option>
        <option value="야구">야구</option>
        <option value="축구">축구</option>
      </select>
    </div>

    <div class="form-group">
      <label for="stadium">경기장</label>
      <select id="stadium">
        <option value="">-- 경기장을 선택하세요 --</option>
        <option value="잠실야구장">잠실야구장</option><option value="고척 돔 야구장">고척 돔 야구장</option><option value="수원 위즈 파크">수원 위즈 파크</option>
      </select>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="opponent_team">상대팀 선택</label>
        <select id="opponent_team"></select>
      </div>
      <div class="form-group">
        <label for="seat_select">좌석 선택</label>
        <select id="seat_select"></select>
      </div>
    </div>
  </form>

  <script type="module">
    const teamList = ['두산 베어스', 'LG 트윈스', 'KT wiz', '삼성 라이온즈', 'SSG 랜더스', '한화 이글스', 'NC 다이노스', '롯데 자이언츠', '키움 히어로즈', 'KIA 타이거즈'];
    const seatMap = {
  "잠실야구장": [
    "중앙석(프리미엄/VIP)",
    "1루 테이블석",
    "3루 테이블석",
    "1루 익사이팅존",
    "3루 익사이팅존",
    "1루 블루석",
    "3루 블루석",
    "1루 오렌지석 (응원석)",
    "3루 오렌지석 (응원석)",
    "1루 레드석",
    "3루 레드석",
    "1루 네이비석",
    "3루 네이비석",
    "중앙 네이비석",
    "1루 외야석",
    "3루 외야석"
  ],
  "고척 돔 야구장": [
    "로얄다이아몬드클럽(R.d-club)",
    "1층 테이블석",
    "2층 테이블석",
    "1루 내야커플석",
    "3루 내야커플석",
    "1루 외야커플석",
    "3루 외야커플석"
  ],
  "수원 위즈 파크": [
    "포수 뒤 테이블석",
    "중앙 테이블석",
    "중앙지정석",
    "1루 내야테이블석",
    "3루 내야테이블석"
  ]
};

    const sportSelect = document.getElementById("sport_type");
    const opponentTeam = document.getElementById("opponent_team");
    const stadiumSelect = document.getElementById("stadium");
    const seatSelect = document.getElementById("seat_select");

    sportSelect.addEventListener("change", () => {
      opponentTeam.innerHTML = '';
      if (sportSelect.value === '야구') {
        teamList.forEach(t => {
          const opt = document.createElement("option");
          opt.value = t;
          opt.textContent = t;
          opponentTeam.appendChild(opt);
        });
      } else {
        opponentTeam.innerHTML = '<option value="">축구 상대팀 (추가 예정)</option>';
        seatSelect.innerHTML = '<option value="">등급/위치 선택 예정</option>';
      }
    });

    stadiumSelect.addEventListener("change", () => {
      const stadium = stadiumSelect.value;
      seatSelect.innerHTML = '';
      if (seatMap[stadium]) {
        seatMap[stadium].forEach(s => {
          const opt = document.createElement("option");
          opt.value = s;
          opt.textContent = s;
          seatSelect.appendChild(opt);
        });
      } else {
        seatSelect.innerHTML = '<option value="">좌석 없음</option>';
      }
    });
  </script>
</body>
</html>
