<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>티켓 등록</title>
</head>
<body>
  <h1>티켓 등록하기</h1>
  <form id="ticketForm">
    <input type="text" name="team" placeholder="팀 이름" required><br>
    <input type="date" name="date" required><br>
    <input type="time" name="time" required><br>
    <input type="text" name="location" placeholder="장소"><br>
    <input type="number" name="price" placeholder="가격" required><br>
    <input type="text" name="contact" placeholder="연락처" required><br>
    <button type="submit">등록하기</button>
  </form>

  <p id="result"></p>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    // 🧩 여기에 본인의 Supabase 정보 입력
    const SUPABASE_URL = 'https://dbdnvjbkotlyarsfmtjn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiZG52amJrb3RseWFyc2ZtdGpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDY5NTUxNTUsImV4cCI6MjA2MjUzMTE1NX0.cQXd9NQQbEQ5tWAeQ2pJWIoGkQjAbVs4tOQAUeDCET0';

    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('ticketForm');
    const result = document.getElementById('result');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData(form);

      const { data, error } = await supabase.from('tickets').insert([
        {
          team: formData.get('team'),
          date: formData.get('date'),
          time: formData.get('time'),
          location: formData.get('location') || null,
          price: parseInt(formData.get('price')),
          contact: formData.get('contact'),
        }
      ]);

      if (error) {
        result.textContent = '오류 발생: ' + error.message;
        result.style.color = 'red';
      } else {
        result.textContent = '티켓이 성공적으로 등록되었습니다!';
        result.style.color = 'green';
        form.reset();
      }
    });
  </script>
</body>
</html>
