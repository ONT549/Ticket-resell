<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>두산 티켓 목록</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .ticket { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>두산 베어스 - 등록된 티켓 목록</h1>
  <div id="ticket-list">불러오는 중...</div>

  <script>
    const SUPABASE_URL = 'https://dbdnvjbkotlyarsfmtjn.supabase.co'; // 여기에 본인의 URL 입력
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiZG52amJrb3RseWFyc2ZtdGpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDY5NTUxNTUsImV4cCI6MjA2MjUzMTE1NX0.cQXd9NQQbEQ5tWAeQ2pJWIoGkQjAbVs4tOQAUeDCET0'; // 여기에 본인의 키 입력
    const TEAM_NAME = '두산 베어스';

    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function fetchTickets() {
      const { data, error } = await supabase
        .from('tickets')
        .select('*')
        .eq('team', '두산 베어스');

      const list = document.getElementById('ticket-list');
      list.innerHTML = '';

      if (error) {
        list.innerHTML = '데이터를 불러오는 중 오류가 발생했습니다';
        console.error(error);
        return;
      }

      if (data.length === 0) {
        list.innerHTML = '등록된 티켓이 없습니다';
        return;
      }

      data.forEach(ticket => {
        const div = document.createElement('div');
        div.className = 'ticket';
        div.innerHTML = `
          <strong>경기 날짜:</strong> ${ticket.date} <br>
          <strong>경기 시간:</strong> ${ticket.match_time}<br>
          <strong>경기장:</strong> ${ticket.stadium}<br>
          <strong>좌석 등급:</strong> ${ticket.seat_grade}<br>
          <strong>좌석 번호:</strong> ${ticket.seat_number}<br>
          <strong>티켓 당 가격:</strong> ${ticket.price}원<br>
          <strong>연락처:</strong> ${ticket.contact_method}<br>
          <strong>판매 수량:</strong> ${ticket.ticket_count}장<br>
          <strong>추가 설명:</strong> ${ticket.additional_info || '없음'}
        `;
        list.appendChild(div);
      });
    }

    fetchTickets();
  </script>
</body>
</html>
