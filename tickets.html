<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>등록된 티켓 보기</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .ticket { border: 1px solid #ccc; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
    .buy-btn { margin-top: 10px; padding: 8px 12px; background-color: #0077cc; color: white; border: none; cursor: pointer; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>등록된 티켓</h1>
  <div id="ticketList">불러오는 중...</div>

  <script>
    const SUPABASE_URL = 'https://dbdnvjbkotlyarsfmtjn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiZG52amJrb3RseWFyc2ZtdGpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDY5NTUxNTUsImV4cCI6MjA2MjUzMTE1NX0.cQXd9NQQbEQ5tWAeQ2pJWIoGkQjAbVs4tOQAUeDCET0'; // 본인 키
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function loadTickets() {
      const { data, error } = await supabase.from('tickets').select('*').eq('status', 'available');

      const container = document.getElementById('ticketList');
      container.innerHTML = '';

      if (error) {
        container.textContent = '티켓 불러오기 실패: ' + error.message;
        return;
      }

      if (data.length === 0) {
        container.textContent = '등록된 티켓이 없습니다.';
        return;
      }

      data.forEach(ticket => {
        const ticketEl = document.createElement('div');
        ticketEl.className = 'ticket';
        ticketEl.innerHTML = `
          <strong>팀:</strong> ${ticket.team}<br>
          <strong>날짜:</strong> ${ticket.date}<br>
          <strong>시간:</strong> ${ticket.time}<br>
          <strong>장소:</strong> ${ticket.location || '정보 없음'}<br>
          <strong>가격:</strong> ${ticket.price}원<br>
          <strong>연락처:</strong> ${ticket.contact}<br>
          <button class="buy-btn" onclick="buyTicket(${ticket.id})">구매하기</button>
        `;
        container.appendChild(ticketEl);
      });
    }

    function buyTicket(ticketId) {
      alert(`이 티켓(ID: ${ticketId})에 대한 결제 기능은 추후 구현 예정입니다.`);
    }

    loadTickets();
  </script>
</body>
</html>
