
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Our Ticket 로그인</title>
</head>
<body>
  <h1>로그인</h1>

  <input type="email" id="email" placeholder="이메일을 입력하세요" />
  <input type="password" id="password" placeholder="비밀번호를 입력하세요" />

  <button id="login-btn">로그인</button>

  <hr/>
  <button id="google-login" style="background-color: #4285F4; color: white; margin-top: 10px;">
    Google 계정으로 로그인
  </button>

  <div style="margin-top: 10px; text-align: center;">
    <a href="signup.html">아직 회원이 아니신가요? 회원가입</a>
  </div>

  <div id="result"></div>

  <script type="module">
    import { supabase } from './supabaseClient.js';

    document.getElementById("login-btn").addEventListener("click", async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      const result = document.getElementById("result");
      if (error) {
        result.textContent = "❌ 로그인 실패: " + error.message;
      } else {
        result.textContent = "✅ 로그인 성공!";
        window.location.href = "index.html";
      }
    });

    document.getElementById("google-login").addEventListener("click", async () => {
      const { data, error } = await supabase.auth.signInWithOAuth({
        provider: 'google'
      });
      if (error) {
        console.error("Google 로그인 실패:", error.message);
      } else {
        console.log("✅ Google 로그인 시도 중...");
      }
    });
  </script>
</body>
</html>
